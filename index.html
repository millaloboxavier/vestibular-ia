<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">
<title>Vestibular FGV — Navegação generativa</title>
<style>
  :root{
    --bg:#fbfbf8;
    --panel:#ffffff;
    --soft:#f5f5f2;
    --line:#deded8;
    --line-strong:#c9c9c0;
    --ink:#121211;
    --muted:#62625d;
    --accent:#111111;
    --lav:#f0f1ff;
    --lav-line:#cdd2ff;
    --green:#19a974;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);font-family: "Google Sans Flex", sans-serif;}
  button,input{font:inherit}
  button{cursor:pointer}
  header{height:78px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;position:sticky;top:0;z-index:80}
  .header-inner{width:min(1240px,calc(100% - 64px));margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:20px}
  .brand{display:flex;align-items:center;gap:13px;border:0;background:transparent;font-weight:900;font-size:25px;letter-spacing:-.05em;color:var(--ink)}
  .mark{width:38px;height:38px;border-radius:999px;background:radial-gradient(circle at 32% 28%,#333,#101010);display:inline-block;flex:0 0 auto}
  nav{display:flex;gap:28px;align-items:center;color:var(--muted)}
  nav button{border:0;background:transparent;color:#4c4c48;font-size:16px;padding:8px 0}
  nav button:hover{color:#111}
  main{width:min(1220px,calc(100% - 72px));margin:0 auto;padding-bottom:80px}
  .hero{min-height:calc(100vh - 78px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:56px 0}
  .top-badge{border:1px solid var(--line-strong);background:#fff;border-radius:999px;padding:12px 24px;display:inline-flex;gap:12px;align-items:center;font-size:21px;font-weight:800;margin-bottom:40px;color:#1d1d1b}
  .dot{width:10px;height:10px;border-radius:999px;background:var(--green);display:inline-block}
  .hero-mark{width:82px;height:82px;border-radius:999px;background:radial-gradient(circle at 32% 28%,#333,#101010);margin-bottom:40px}
  h1{font-size:54px;letter-spacing:-.07em;line-height:1.03;margin:0 0 12px}
  .lead{font-size:24px;color:var(--muted);margin:0 0 42px;letter-spacing:-.035em}
  .search-wrap{width:min(850px,100%);position:relative;margin:0 auto}
  .search-input{width:100%;border:2px solid var(--line-strong);background:#fff;border-radius:999px;padding:22px 86px 22px 32px;font-size:20px;outline:none;transition:border-color .18s,box-shadow .18s}
  .search-input:focus{border-color:#111;box-shadow:0 0 0 4px rgba(0,0,0,.05)}
  .send-btn{position:absolute;right:9px;top:9px;width:56px;height:56px;border:0;border-radius:999px;background:#111;color:#fff;font-weight:900;font-size:27px;display:flex;align-items:center;justify-content:center;line-height:1}
  .send-btn:disabled{opacity:.55;cursor:default}
  .suggestions{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin:34px auto 0;width:min(840px,100%)}
  .chip{border:1.5px solid var(--line-strong);background:#fff;border-radius:999px;padding:14px 26px;font-size:20px;font-weight:650;color:#111}
  .chip:hover{background:#111;color:#fff;border-color:#111}
  .event-banner{margin-top:56px;width:min(960px,100%);border:1.5px solid var(--line-strong);background:#fff;border-radius:24px;padding:25px 32px;display:flex;justify-content:space-between;align-items:center;gap:24px;text-align:left;color:#111}
  .event-banner small{display:block;text-transform:uppercase;letter-spacing:.08em;color:#777;font-size:15px;font-weight:900;margin-bottom:6px}
  .event-banner strong{display:block;font-size:27px;letter-spacing:-.045em;margin-bottom:5px}
  .event-banner span{display:block;color:var(--muted);font-size:20px}
  .event-banner b{font-size:22px;white-space:nowrap}
  .top-search{display:none;position:sticky;top:78px;z-index:70;background:rgba(251,251,248,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:18px 0}
  .top-search.show{display:block}
  .top-search .search-input{padding-top:16px;padding-bottom:16px;font-size:18px}
  .top-search .send-btn{width:46px;height:46px;top:7px;font-size:22px}
  .results{display:none;padding-top:38px}
  .results.show{display:block}
  .panel{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:0 18px 45px rgba(0,0,0,.035)}
  .context-card{background:var(--lav);border-color:var(--lav-line);padding:34px 38px;margin-bottom:26px;overflow:hidden}
  .query{font-size:18px;color:#3b4271;margin-bottom:18px;letter-spacing:-.02em}
  .query strong{font-weight:850;color:#111}
  .context-card h2{font-size:46px;letter-spacing:-.075em;line-height:1.03;margin:0 0 18px;max-width:1000px}
  .context-card p{font-size:24px;color:#555;line-height:1.4;margin:0;max-width:1050px;letter-spacing:-.04em}
  .thinking{display:none;background:#fff;border:1px solid var(--line);border-radius:28px;padding:26px 30px;margin-bottom:24px;box-shadow:0 18px 45px rgba(0,0,0,.03)}
  .thinking.show{display:block}
  .thinking-title{display:flex;align-items:center;gap:12px;font-size:22px;font-weight:850;margin-bottom:10px}
  .thinking-title::before{content:"";width:12px;height:12px;border-radius:999px;background:#111;animation:pulse 1.1s ease-in-out infinite}
  .thinking-steps{display:flex;flex-wrap:wrap;gap:9px;color:#555}
  .thinking-steps span{border:1px solid var(--line);border-radius:999px;background:var(--soft);padding:8px 12px;font-size:14px}
  .dots::after{content:"";animation:dots 1.2s steps(4,end) infinite}
  @keyframes dots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}100%{content:""}}
  @keyframes pulse{0%,100%{transform:scale(.9);opacity:.45}50%{transform:scale(1.15);opacity:1}}
  .section{padding:30px 32px;margin-bottom:22px;opacity:0;transform:translateY(18px);transition:opacity .36s ease,transform .36s ease}
  .section.reveal{opacity:1;transform:translateY(0)}
  .section.compact{padding:24px 28px}
  .section h3{font-size:31px;letter-spacing:-.05em;margin:0 0 10px;line-height:1.1}
  .section-intro{font-size:18px;color:var(--muted);line-height:1.45;margin:0 0 22px;max-width:930px}
  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
  .card{border:1px solid var(--line);background:var(--soft);border-radius:22px;padding:22px;min-width:0}
  .card h4{font-size:23px;letter-spacing:-.04em;line-height:1.15;margin:0 0 6px}
  .meta{color:var(--muted);font-size:15px;line-height:1.35;margin-bottom:13px}
  .card p{color:var(--muted);font-size:16px;line-height:1.45;margin:0 0 14px}
  .tags{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
  .tag{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 10px;color:#555;font-size:13px;line-height:1}
  .link-btn{display:inline-flex;align-items:center;justify-content:center;border:1.5px solid #111;border-radius:999px;padding:10px 16px;background:#fff;font-weight:800;margin-top:6px}
  .link-btn:hover{background:#111;color:#fff}
  .course-tabs{display:flex;gap:12px;flex-wrap:wrap;margin:4px 0 22px}
  .course-tab{border:2px solid #111;background:#fff;border-radius:999px;padding:13px 24px;font-size:21px;font-weight:900;letter-spacing:-.045em;color:#111}
  .course-tab.active{background:#111;color:#fff}
  .course-city-panel{display:none}
  .course-city-panel.active{display:block;animation:softIn .25s ease both}
  @keyframes softIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .timeline{display:grid;gap:12px}
  .timeline-item{display:grid;grid-template-columns:210px 1fr;gap:18px;align-items:start;border:1px solid var(--line);background:var(--soft);border-radius:20px;padding:18px 20px}
  .timeline-date{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font-weight:850;text-align:center}
  .timeline-body b{font-size:18px;display:block;margin-bottom:4px}.timeline-body span{color:var(--muted);line-height:1.4}
  .event-row{display:grid;grid-template-columns:120px 1fr auto;gap:18px;align-items:center;border:1px solid var(--line);background:var(--soft);border-radius:22px;padding:18px;margin-bottom:12px}
  .date-box{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;text-align:center;font-weight:850}.date-box span{display:block;color:var(--muted);font-weight:600;font-size:13px;margin-top:4px}
  .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff}table{width:100%;border-collapse:collapse;min-width:760px}th,td{border-bottom:1px solid var(--line);padding:14px 16px;text-align:left;vertical-align:top}th{background:var(--soft);font-weight:850}tr:last-child th,tr:last-child td{border-bottom:0}
  .continue{background:#fff;border:1px solid var(--line);border-radius:24px;padding:20px 24px;margin-bottom:22px;opacity:0;transform:translateY(18px);transition:opacity .36s ease,transform .36s ease}
  .continue.reveal{opacity:1;transform:translateY(0)}
  .continue h3{font-size:22px;margin:0 0 5px;letter-spacing:-.04em}.continue p{margin:0 0 14px;color:var(--muted);font-size:16px}.actions{display:flex;flex-wrap:wrap;gap:10px}.action-chip{border:1.5px solid #111;border-radius:999px;background:#fff;padding:10px 15px;font-weight:800}.action-chip.primary{background:#111;color:#fff}
  .lead-form{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-top:12px}.lead-form input{border:1px solid var(--line);border-radius:999px;padding:14px 16px;font-size:15px;background:#fff}.lead-form button{border:0;background:#111;color:#fff;border-radius:999px;padding:14px 20px;font-weight:850}.saved{display:none;color:#0d744b;font-weight:800;margin-top:12px}.saved.show{display:block}
  .notice{border:1px solid #e0a5a5;background:#fff2f2;color:#8a2020;border-radius:18px;padding:16px 18px;margin-bottom:22px;font-weight:650;display:none}.notice.show{display:block}.debug{font-size:11px;color:#999;margin-top:16px;display:none}
  @media(max-width:850px){header{height:64px}.header-inner{width:min(100% - 32px,1240px)}.brand{font-size:21px}.mark{width:30px;height:30px}nav{display:none}main{width:min(100% - 32px,1220px)}.hero{padding-top:34px}.top-badge{font-size:16px;margin-bottom:28px}.hero-mark{width:66px;height:66px;margin-bottom:28px}h1{font-size:39px}.lead{font-size:19px}.search-input{font-size:17px;padding:19px 75px 19px 22px}.send-btn{width:50px;height:50px;top:7px}.event-banner{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr}.timeline-item,.event-row{grid-template-columns:1fr}.lead-form{grid-template-columns:1fr}.context-card{padding:26px}.context-card h2{font-size:34px}.context-card p{font-size:19px}.section{padding:24px}.section h3{font-size:26px}.course-tab{font-size:18px;padding:11px 18px}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <button class="brand" type="button" data-home><span class="mark"></span>Vestibular FGV</button>
    <nav>
      <button type="button" data-prompt="quais cursos a FGV oferece?">Cursos</button>
      <button type="button" data-prompt="quais são as datas de inscrição no vestibular?">Processo seletivo</button>
      <button type="button" data-prompt="quais formas de ingresso posso usar?">Formas de ingresso</button>
      <button type="button" data-prompt="quais bolsas de estudo a FGV oferece?">Bolsas</button>
    </nav>
  </div>
</header>

<div class="top-search" id="topSearch">
  <div class="search-wrap">
    <input id="topQuery" class="search-input" placeholder="Pergunte sobre cursos, datas, formas de ingresso, bolsas, eventos ou provas..." />
    <button id="topBtn" class="send-btn" aria-label="Buscar">↑</button>
  </div>
</div>

<main>
  <section class="hero" id="hero">
    <button class="top-badge" type="button" data-prompt="quais são as datas de inscrição no processo seletivo 2027.1?"><span class="dot"></span>Processo seletivo 2027.1 — inscrições a partir de 27/07</button>
    <div class="hero-mark"></div>
    <h1>Encontre o melhor caminho para entrar na FGV</h1>
    <p class="lead">Pergunte sobre cursos, inscrições, formas de ingresso, bolsas, provas ou eventos da graduação.</p>
    <div class="search-wrap">
      <input id="query" class="search-input" placeholder="ex: quero saber quando termina a inscrição do curso de Direito" autofocus />
      <button id="mainBtn" class="send-btn" aria-label="Buscar">↑</button>
    </div>
    <div class="suggestions" id="suggestions"></div>
    <button class="event-banner" type="button" data-prompt="quais eventos da graduação estão disponíveis?">
      <div><small>Evento em destaque</small><strong>Semana Imersiva FGV 2026</strong><span>Viva a experiência universitária na prática — Rio, São Paulo e Brasília</span></div>
      <b>Saiba mais →</b>
    </button>
  </section>

  <section class="results" id="results">
    <div class="notice" id="notice"></div>
    <div class="context-card panel" id="resultHead"></div>
    <div class="thinking" id="thinking">
      <div class="thinking-title"><span class="dots">Organizando sua jornada</span></div>
      <div class="thinking-steps"><span>entendendo o que você precisa</span><span>identificando curso, cidade e momento</span><span>organizando os próximos caminhos</span></div>
    </div>
    <div id="sections"></div>
    <div class="debug" id="debug"></div>
  </section>
</main>

<script>
  const API_ENDPOINT = "/api/generate-ui";
  const defaultSuggestions = ["Quero me inscrever", "Quero conhecer os cursos", "Comparar cursos", "Ver provas anteriores", "Quais bolsas a FGV oferece?"];
  const cityOrder = ["Rio de Janeiro", "São Paulo", "Brasília"];
  const $ = (selector) => document.querySelector(selector);
  const $$ = (selector) => Array.from(document.querySelectorAll(selector));
  const safeArray = (value) => Array.isArray(value) ? value : [];
  const escapeHtml = (value = "") => String(value).replace(/[&<>'"]/g, (char) => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[char]));
  const uid = () => `uid-${Math.random().toString(36).slice(2,9)}`;

  function cleanTag(value = "") {
    const text = String(value || "").trim();
    if (!text) return "";
    if (/consultar página|página do curso|site oficial/i.test(text)) return "";
    return text.replace(/\s*indicado\s+na\s+página(\s+de\s+processo\s+seletivo)?/i, "").trim();
  }

  function setSuggestions(items = defaultSuggestions) {
    $("#suggestions").innerHTML = safeArray(items).map((text) => `<button class="chip" type="button" data-prompt="${escapeHtml(text)}" data-label="${escapeHtml(text)}">${escapeHtml(text)}</button>`).join("");
  }

  function setLoading(isLoading) {
    ["#mainBtn", "#topBtn"].forEach((id) => {
      const btn = $(id);
      btn.disabled = isLoading;
      btn.textContent = isLoading ? "…" : "↑";
    });
  }

  function showNotice(text) {
    const box = $("#notice");
    box.textContent = text || "";
    box.classList.toggle("show", Boolean(text));
  }

  function goHome() {
    $("#hero").style.display = "flex";
    $("#topSearch").classList.remove("show");
    $("#results").classList.remove("show");
    $("#query").value = "";
    $("#topQuery").value = "";
    $("#sections").innerHTML = "";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function prepareThinking(displayLabel) {
    $("#hero").style.display = "none";
    $("#topSearch").classList.add("show");
    $("#results").classList.add("show");
    $("#sections").innerHTML = "";
    $("#resultHead").innerHTML = `<div class="query">${escapeHtml(displayLabel ? "Você selecionou" : "Você perguntou")}: <strong>${escapeHtml(displayLabel || $("#topQuery").value || $("#query").value)}</strong></div><h2>Estou montando um caminho para você.</h2><p>Vou organizar as informações mais úteis para o seu momento.</p>`;
    $("#thinking").classList.add("show");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  async function typeText(el, text, speed = 10) {
    el.textContent = "";
    const value = String(text || "");
    for (let i = 0; i < value.length; i++) {
      el.textContent += value[i];
      if (i % 3 === 0) await new Promise((resolve) => setTimeout(resolve, speed));
    }
  }

  async function search(value, options = {}) {
    const topVisible = $("#topSearch").classList.contains("show");
    const activeId = document.activeElement?.id;
    const typedValue = activeId === "topQuery" ? $("#topQuery").value : activeId === "query" ? $("#query").value : topVisible ? $("#topQuery").value : $("#query").value;
    const message = String(value || typedValue || "").trim();
    if (!message) return;

    // Toda nova digitação reinicia o contexto anterior. A IA recebe apenas a pergunta atual.
    if (!options.fromAction) {
      $("#query").value = message;
      $("#topQuery").value = message;
    }

    setLoading(true);
    showNotice("");
    prepareThinking(options.displayLabel || "");

    try {
      const response = await fetch(API_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });
      const payload = await response.json();
      if (!response.ok) throw new Error(payload.error || "Não consegui montar essa resposta agora.");
      await renderPlan(payload, message, options);
    } catch (error) {
      console.error(error);
      $("#thinking").classList.remove("show");
      $("#resultHead").innerHTML = `<div class="query">Sua pergunta: <strong>${escapeHtml(message)}</strong></div><h2>Não foi possível montar a resposta agora.</h2><p>Tente novamente em instantes.</p>`;
      $("#sections").innerHTML = "";
      showNotice(error.message);
    } finally {
      setLoading(false);
    }
  }

  async function renderPlan(plan, originalMessage, options = {}) {
    const displayText = options.displayLabel || originalMessage;
    $("#thinking").classList.remove("show");
    $("#resultHead").innerHTML = `<div class="query">${escapeHtml(options.displayLabel ? "Você selecionou" : "Você perguntou")}: <strong>${escapeHtml(displayText)}</strong></div><h2>${escapeHtml(plan.pageTitle || "Caminho sugerido")}</h2><p id="answerText"></p>`;
    await typeText($("#answerText"), plan.answer || "Separei as informações mais relevantes para você continuar.", 7);

    const sections = safeArray(plan.sections);
    const container = $("#sections");
    container.innerHTML = "";
    if (!sections.length) {
      container.innerHTML = `<section class="section panel reveal"><h3>Não encontrei um caminho para essa pergunta</h3><p class="section-intro">Tente perguntar por curso, cidade, forma de ingresso, bolsas, eventos ou datas de inscrição.</p></section>`;
    } else {
      for (const section of sections) {
        const html = renderSection(section);
        if (!html) continue;
        const wrap = document.createElement("div");
        wrap.innerHTML = html;
        const node = wrap.firstElementChild;
        container.appendChild(node);
        bindDynamicActions(node);
        await new Promise((resolve) => setTimeout(resolve, 180));
        node.classList.add("reveal");
      }
    }
    $("#debug").textContent = plan.debug ? JSON.stringify(plan.debug) : "";
    bindDynamicActions();
  }

  function renderSection(section) {
    if (!section || !section.type) return "";
    if (section.type === "course_cards") return renderCourseCards(section);
    if (section.type === "course_detail") return renderCourseDetail(section);
    if (section.type === "timeline") return renderTimeline(section);
    if (section.type === "admission_options") return renderAdmissionOptions(section);
    if (section.type === "events") return renderEvents(section);
    if (section.type === "course_differentials" || section.type === "school_recognitions" || section.type === "admission_details") return renderInfoCards(section);
    if (section.type === "scholarships") return renderScholarships(section);
    if (section.type === "course_compare") return renderCompare(section);
    if (section.type === "prep_materials") return renderInfoCards(section);
    if (section.type === "lead_form") return renderLeadForm(section);
    if (section.type === "next_step") return renderNextStep(section);
    if (section.type === "warning") return renderWarning(section);
    return "";
  }

  function sectionHeader(section) {
    return `<h3>${escapeHtml(section.title || "")}</h3>${section.intro ? `<p class="section-intro">${escapeHtml(section.intro)}</p>` : ""}`;
  }

  function courseCard(course) {
    const title = course.displayName || course.name || "Curso";
    const tags = [course.duration, course.period, course.entry, course.candidatePerSeat ? `${String(course.candidatePerSeat).replace(/\.$/, "")} candidato/vaga` : ""].map(cleanTag).filter(Boolean).slice(0, 4);
    const prompt = `quero detalhes do curso de ${title} em ${course.city || ""}`;
    return `<article class="card">
      <h4>${escapeHtml(title)}</h4>
      <div class="meta">${escapeHtml([course.school, course.city && `${course.city}${course.state ? ` / ${course.state}` : ""}`].filter(Boolean).join(" · "))}</div>
      <p>${escapeHtml(course.summary || "Veja informações sobre o curso, cidade, formas de ingresso e próximos caminhos.")}</p>
      ${tags.length ? `<div class="tags">${tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>` : ""}
      <button class="link-btn" type="button" data-prompt="${escapeHtml(prompt)}" data-label="${escapeHtml(title)}">Ver detalhes</button>
    </article>`;
  }

  function renderCourseDetail(section) {
    const items = safeArray(section.items);
    if (!items.length) return "";
    return `<section class="section panel">${sectionHeader(section)}<div class="detail-grid">${items.map((item) => `<div class="detail-item"><small>${escapeHtml(item.title || item.label || "Informação")}</small><strong>${escapeHtml(item.value || item.shortDescription || item.description || "")}</strong></div>`).join("")}</div></section>`;
  }

  function renderCourseCards(section) {
    const items = safeArray(section.items);
    if (!items.length) return "";
    const shouldUseTabs = section.layout === "tabs_by_city" || new Set(items.map((item) => item.city).filter(Boolean)).size > 1;
    if (!shouldUseTabs) return `<section class="section panel">${sectionHeader(section)}<div class="grid">${items.map(courseCard).join("")}</div></section>`;

    const id = uid();
    const grouped = {};
    items.forEach((course) => {
      const city = course.city || "Outras opções";
      grouped[city] = grouped[city] || [];
      grouped[city].push(course);
    });
    const cities = cityOrder.filter((city) => grouped[city]?.length).concat(Object.keys(grouped).filter((city) => !cityOrder.includes(city)));
    const tabs = cities.map((city, index) => `<button class="course-tab ${index === 0 ? "active" : ""}" type="button" data-tab-root="${id}" data-tab-city="${escapeHtml(city)}">${escapeHtml(city)}</button>`).join("");
    const panels = cities.map((city, index) => `<div class="course-city-panel ${index === 0 ? "active" : ""}" data-tab-panel="${id}" data-tab-city="${escapeHtml(city)}"><div class="grid">${grouped[city].map(courseCard).join("")}</div></div>`).join("");
    return `<section class="section panel">${sectionHeader(section)}<div class="course-tabs">${tabs}</div>${panels}</section>`;
  }

  function renderTimeline(section) {
    const items = safeArray(section.items);
    if (!items.length) return "";
    return `<section class="section panel">${sectionHeader(section)}<div class="timeline">${items.map((item) => `<div class="timeline-item"><div class="timeline-date">${escapeHtml(item.value || item.period || "Em breve")}</div><div class="timeline-body"><b>${escapeHtml(item.label || item.name || "Data")}</b>${item.description ? `<span>${escapeHtml(item.description)}</span>` : ""}</div></div>`).join("")}</div></section>`;
  }

  function renderAdmissionOptions(section) {
    const items = safeArray(section.items);
    if (!items.length) return "";
    return `<section class="section panel">${sectionHeader(section)}<div class="grid">${items.map((item) => {
      const prompt = `quero saber mais sobre ${item.label || item.name || "essa forma de ingresso"}`;
      return `<article class="card"><h4>${escapeHtml(item.label || item.name || "Forma de ingresso")}</h4><div class="meta">${escapeHtml([item.cycle, item.status].filter(Boolean).join(" · "))}</div><p>${escapeHtml(item.description || "Modalidade de ingresso para a graduação FGV.")}</p>${item.period ? `<div class="tags"><span class="tag">${escapeHtml(item.period)}</span></div>` : ""}<button class="link-btn" type="button" data-prompt="${escapeHtml(prompt)}" data-label="${escapeHtml(item.label || item.name || "Forma de ingresso")}">Entender esta opção</button></article>`;
    }).join("")}</div></section>`;
  }

  function renderEvents(section) {
    const items = safeArray(section.items);
    if (!items.length) return "";
    return `<section class="section panel">${sectionHeader(section)}${items.map((event) => `<div class="event-row"><div class="date-box">${escapeHtml(event.displayDate || event.date || "Data")}<span>${escapeHtml(event.displayTime || "")}</span></div><div><b>${escapeHtml(event.name || event.title || "Evento")}</b>${event.city ? `<span>${escapeHtml([event.city, event.state].filter(Boolean).join(" / "))}</span>` : ""}<p>${escapeHtml(event.description || "")}</p></div><button class="link-btn" type="button" data-prompt="${escapeHtml(`quero participar do evento ${event.name || event.title || "da graduação"}`)}" data-label="${escapeHtml(event.name || event.title || "Evento")}">Tenho interesse</button></div>`).join("")}</section>`;
  }

  function renderInfoCards(section) {
    const items = safeArray(section.items);
    if (!items.length) return "";
    return `<section class="section panel">${sectionHeader(section)}<div class="grid">${items.map((item) => `<article class="card"><h4>${escapeHtml(item.title || item.label || item.name || "Informação")}</h4>${item.type ? `<div class="meta">${escapeHtml(item.type)}</div>` : ""}<p>${escapeHtml(item.shortDescription || item.description || item.text || "")}</p></article>`).join("")}</div></section>`;
  }

  function renderScholarships(section) {
    const items = safeArray(section.items);
    if (!items.length) return "";
    return `<section class="section panel">${sectionHeader(section)}<div class="grid">${items.map((item) => `<article class="card"><h4>${escapeHtml(item.name || item.title || "Bolsa")}</h4>${item.type ? `<div class="meta">${escapeHtml(item.type)}</div>` : ""}<p>${escapeHtml(item.shortDescription || item.description || "")}</p>${safeArray(item.cities).length ? `<div class="tags">${safeArray(item.cities).slice(0,3).map((city) => `<span class="tag">${escapeHtml(city)}</span>`).join("")}</div>` : ""}</article>`).join("")}</div></section>`;
  }

  function renderCompare(section) {
    const items = safeArray(section.items);
    if (items.length < 2) return renderCourseCards({...section, type:"course_cards"});
    const rows = [["Cidade", (c) => [c.city, c.state].filter(Boolean).join(" / ")], ["Escola", (c) => c.school || ""], ["Duração", (c) => cleanTag(c.duration) || "A definir"], ["Período", (c) => cleanTag(c.period) || "A definir"], ["Formas de ingresso", (c) => safeArray(c.admissions).join(", ") || "A definir"]];
    return `<section class="section panel">${sectionHeader(section)}<div class="table-wrap"><table><thead><tr><th></th>${items.map((course) => `<th>${escapeHtml(course.displayName || course.name || "Curso")}</th>`).join("")}</tr></thead><tbody>${rows.map(([label, getter]) => `<tr><th>${escapeHtml(label)}</th>${items.map((course) => `<td>${escapeHtml(getter(course))}</td>`).join("")}</tr>`).join("")}</tbody></table></div></section>`;
  }

  function renderLeadForm(section) {
    return `<section class="section panel"><h3>${escapeHtml(section.title || "Receba novidades")}</h3><p class="section-intro">${escapeHtml(section.intro || "Deixe seus dados para acompanhar novidades sobre seu interesse.")}</p><form class="lead-form" data-lead-form><input name="name" placeholder="Nome" required /><input name="email" type="email" placeholder="E-mail" required /><button type="submit">Enviar</button></form><div class="saved">Pronto. Seu contato foi registrado.</div></section>`;
  }

  function renderNextStep(section) {
    const items = safeArray(section.items || section.actions).filter((item) => item.label || item.text);
    if (!items.length) return "";
    return `<section class="continue"><h3>${escapeHtml(section.title || "Quer seguir por onde agora?")}</h3><p>${escapeHtml(section.intro || "Escolha um próximo passo.")}</p><div class="actions">${items.map((item) => `<button class="action-chip ${item.tone === "primary" ? "primary" : ""}" type="button" data-prompt="${escapeHtml(item.prompt || item.text || item.label || "")}" data-label="${escapeHtml(item.label || item.text || "Continuar")}">${escapeHtml(item.label || item.text || "Continuar")}</button>`).join("")}</div></section>`;
  }

  function renderWarning(section) {
    return `<section class="section panel compact"><h3>${escapeHtml(section.title || "Não encontrei esse caminho")}</h3><p class="section-intro">${escapeHtml(section.intro || "Você pode perguntar por cursos, formas de ingresso, bolsas, provas, eventos ou inscrição.")}</p></section>`;
  }

  function bindTabs(root = document) {
    root.querySelectorAll('[data-tab-root]').forEach((btn) => {
      btn.onclick = () => {
        const id = btn.getAttribute('data-tab-root');
        const city = btn.getAttribute('data-tab-city');
        document.querySelectorAll(`[data-tab-root="${id}"]`).forEach((item) => item.classList.toggle('active', item.getAttribute('data-tab-city') === city));
        document.querySelectorAll(`[data-tab-panel="${id}"]`).forEach((panel) => panel.classList.toggle('active', panel.getAttribute('data-tab-city') === city));
      };
    });
  }

  function bindDynamicActions(root = document) {
    root.querySelectorAll('[data-prompt]').forEach((el) => {
      el.onclick = () => search(el.getAttribute('data-prompt'), { fromAction: true, displayLabel: el.getAttribute('data-label') || el.textContent.trim() });
    });
    root.querySelectorAll('[data-home]').forEach((el) => { el.onclick = goHome; });
    root.querySelectorAll('[data-lead-form]').forEach((form) => {
      form.onsubmit = (event) => {
        event.preventDefault();
        const payload = Object.fromEntries(new FormData(form).entries());
        payload.query = $("#topQuery").value || $("#query").value || "";
        const leads = JSON.parse(localStorage.getItem("fgv_leads") || "[]");
        leads.push({ ...payload, createdAt: new Date().toISOString() });
        localStorage.setItem("fgv_leads", JSON.stringify(leads));
        form.parentElement.querySelector('.saved')?.classList.add('show');
        form.reset();
      };
    });
    bindTabs(root);
  }

  $("#mainBtn").addEventListener("click", () => search());
  $("#topBtn").addEventListener("click", () => search());
  $("#query").addEventListener("keydown", (event) => { if (event.key === "Enter") search(); });
  $("#topQuery").addEventListener("keydown", (event) => { if (event.key === "Enter") search(); });
  setSuggestions();
  bindDynamicActions();
</script>
</body>
</html>
